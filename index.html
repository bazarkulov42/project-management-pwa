<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Система управления проектами</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; justify-content: center; }
    #root { width: 100%; max-width: 420px; position: relative; }

    .header { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid #e5e7eb; padding: 12px 16px 8px; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .header-title { display: flex; align-items: center; gap: 8px; }
    .header-title h1 { font-size: 17px; font-weight: 700; color: #111827; }
    .header-subtitle { font-size: 12px; color: #6b7280; margin-top: 1px; }
    .btn-add { color: #fff; border: none; border-radius: 20px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .search-bar { width: 100%; padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; background: #f9fafb; }
    .gantt-toggle { display: flex; background: #f3f4f6; border-radius: 8px; padding: 2px; gap: 2px; }
    .gantt-toggle button { flex: 1; padding: 6px; border: none; background: transparent; border-radius: 6px; font-size: 13px; cursor: pointer; color: #6b7280; }
    .gantt-toggle button.active { background: #fff; color: #111827; font-weight: 700; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: #fff; border-top: 1px solid #e5e7eb; display: flex; z-index: 200; padding: 4px 0 6px; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 0; position: relative; min-height: 44px; justify-content: center; }
    .nav-icon { font-size: 18px; filter: grayscale(1) opacity(.45); line-height: 1; }
    .nav-label { font-size: 9px; color: #9ca3af; font-weight: 500; }
    .nav-item.active .nav-icon { filter: none; }
    .nav-item.active .nav-label { color: #111827; font-weight: 700; }
    .nav-item.active::after { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 3px; border-radius: 0 0 3px 3px; background: var(--ac); }

    .content { padding: 12px 12px 80px; }

    .card { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; border: 1px solid #e5e7eb; }
    .card-link { border: 1.5px solid #7c3aed; }
    .card-title { font-size: 14px; font-weight: 600; color: #111827; margin-bottom: 4px; }
    .card-title a { color: #7c3aed; text-decoration: none; }
    .card-meta { font-size: 12px; color: #6b7280; margin-bottom: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
    .card-url { font-size: 11px; color: #6b7280; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; }
    .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .tag { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .card-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
    .btn-del { background: none; border: none; color: #ef4444; font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .b-green { background:#dcfce7; color:#16a34a; }
    .b-gray  { background:#f3f4f6; color:#6b7280; }
    .b-blue  { background:#dbeafe; color:#1a6fd4; }
    .b-amber { background:#fef3c7; color:#d97706; }
    .b-red   { background:#fee2e2; color:#dc2626; }
    .b-purple{ background:#ede9fe; color:#7c3aed; }

    .avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }

    .sum-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .sum-card { background:#fff; border-radius:10px; padding:10px 12px; border:1px solid #e5e7eb; }
    .sum-val  { font-size:22px; font-weight:800; }
    .sum-lbl  { font-size:11px; color:#6b7280; margin-top:2px; }

    .ptrack { background:#e5e7eb; border-radius:4px; height:8px; overflow:hidden; margin:6px 0; }
    .pbar   { height:100%; border-radius:4px; }

    .pcard  { background:#fff; border-radius:10px; padding:12px 14px; margin-bottom:10px; border:1px solid #e5e7eb; }
    .ph     { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .pname  { font-size:14px; font-weight:700; color:#111827; }
    .prole  { font-size:11px; color:#6b7280; }
    .ppct   { font-size:16px; font-weight:800; }
    .wtag   { font-size:11px; padding:3px 8px; border-radius:6px; display:inline-block; margin-top:4px; }
    .wred   { background:#fee2e2; color:#dc2626; }
    .wamber { background:#fef3c7; color:#d97706; }
    .pchip  { font-size:11px; color:#374151; padding:2px 0; border-bottom:1px solid #f3f4f6; }

    .gantt-wrap { overflow-x:auto; background:#fff; border-radius:10px; border:1px solid #e5e7eb; padding:8px 0; }
    .dl-section { margin-top:12px; }
    .dl-section h3 { font-size:13px; font-weight:700; color:#374151; margin-bottom:8px; }
    .dl-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #f3f4f6; }
    .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:300; display:flex; align-items:flex-end; justify-content:center; }
    .modal { background:#fff; width:100%; max-width:420px; border-radius:16px 16px 0 0; padding:20px 16px; max-height:85vh; overflow-y:auto; }
    .modal-handle { width:36px; height:4px; background:#d1d5db; border-radius:2px; margin:0 auto 16px; }
    .modal h2 { font-size:17px; font-weight:700; color:#111827; margin-bottom:16px; }
    .field { margin-bottom:12px; }
    .field label { font-size:12px; font-weight:600; color:#374151; display:block; margin-bottom:4px; }
    .field input, .field select, .field textarea { width:100%; padding:9px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; font-family:inherit; outline:none; background:#fff; }
    .field textarea { resize:vertical; min-height:80px; }
    .field-check { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:#374151; }
    .field-check input { width:18px; height:18px; cursor:pointer; }
    .btn-save { width:100%; padding:12px; border:none; border-radius:10px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; margin-top:4px; margin-bottom:8px; }

    .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); padding:10px 18px; border-radius:10px; color:#fff; font-size:13px; font-weight:600; z-index:500; box-shadow:0 4px 12px rgba(0,0,0,.2); white-space:nowrap; animation:sd .25s ease; }
    @keyframes sd { from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)} }

    .vcard { border-radius:10px; padding:14px; margin-bottom:12px; }
    .vtitle { font-size:18px; font-weight:800; margin-bottom:4px; }
    .vscore { font-size:13px; margin-bottom:10px; }
    .vsumm  { font-size:13px; line-height:1.5; }
    .aissue { background:#fee2e2; color:#991b1b; border-radius:6px; padding:6px 10px; font-size:12px; margin-bottom:5px; }
    .arec   { background:#e0f2fe; color:#0c4a6e; border-radius:6px; padding:6px 10px; font-size:12px; margin-bottom:5px; }
    .astitle{ font-size:12px; font-weight:700; color:#374151; margin:10px 0 6px; }
    .rcard  { background:#f3f4f6; border-radius:8px; padding:8px 12px; font-size:13px; color:#374151; margin-bottom:8px; }
    .api-note { font-size:11px; color:#9ca3af; margin-top:4px; }

    .dept-card { display:flex; align-items:flex-start; gap:10px; }
    .dept-icon { font-size:28px; }

    .empty { text-align:center; padding:40px 20px; color:#9ca3af; font-size:14px; }
    .empty-icon { font-size:36px; margin-bottom:8px; }

    .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
    .cspinner { width:20px; height:20px; border:2px solid #e5e7eb; border-top-color:#1a6fd4; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .checking { display:flex; align-items:center; justify-content:center; gap:8px; padding:16px; color:#6b7280; font-size:14px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { h, render, Component } from 'https://esm.sh/preact@10.22.0';
import { useState, useMemo, useEffect, useRef } from 'https://esm.sh/preact@10.22.0/hooks';

const TAG_COLORS = {
  'ИБ':{'bg':'#fee2e2','color':'#991b1b'},'Политика':{'bg':'#ede9fe','color':'#6d28d9'},
  'Основной':{'bg':'#dbeafe','color':'#1e40af'},'PMO':{'bg':'#d1fae5','color':'#065f46'},
  'ITSM':{'bg':'#fef3c7','color':'#92400e'},'Ссылка':{'bg':'#ede9fe','color':'#7c3aed'},
  'Загружено':{'bg':'#e0f2fe','color':'#075985'},
};
const tagStyle = t => TAG_COLORS[t] || {bg:'#e5e7eb',color:'#374151'};

const AV_COLORS = ['#1a6fd4','#7c3aed','#0f7a5a','#b45309','#be185d','#0e7490','#16a34a'];
const avatarColor = (name,i=0) => AV_COLORS[(name.charCodeAt(0)+(i||0)) % AV_COLORS.length];
const initials = name => { const p=(name||'').trim().split(' '); return (p[0]?.[0]||'')+(p[1]?.[0]||''); };

const SECTIONS = [
  {id:'docs',  icon:'📄',label:'Документы', color:'#1a6fd4'},
  {id:'regs',  icon:'📋',label:'Регламенты',color:'#0f7a5a'},
  {id:'proj',  icon:'🗂', label:'Проекты',   color:'#7c3aed'},
  {id:'dept',  icon:'🏢',label:'Департам.', color:'#b45309'},
  {id:'people',icon:'👤',label:'Сотрудники',color:'#be185d'},
  {id:'load',  icon:'📊',label:'Нагрузка',  color:'#0e7490'},
  {id:'check', icon:'✅',label:'Проверка',  color:'#16a34a'},
];

const INIT_DOCS=[
  {id:1,name:'Политика ИБ v2.3',size:'1.2 МБ',date:'15.03.2026',tags:['ИБ','Политика','Загружено']},
  {id:2,name:'Регламент PMO',size:'840 КБ',date:'20.04.2026',tags:['PMO','Загружено']},
  {id:3,name:'Wiki — ITSM процессы',size:'—',date:'01.06.2026',tags:['ITSM','Ссылка'],type:'link',url:'https://wiki.example.com/itsm'},
];
const INIT_REGS=[
  {id:1,name:'Регламент управления проектами',date:'10.01.2026',status:'Действует',tags:['PMO']},
  {id:2,name:'Регламент информационной безопасности',date:'05.03.2026',status:'Действует',tags:['ИБ']},
  {id:3,name:'Регламент ITSM v1',date:'01.09.2025',status:'Архив',tags:['ITSM']},
  {id:4,name:'Регламент HR-процессов',date:'15.06.2026',status:'Разработка',tags:[]},
];
const INIT_PEOPLE=[
  {id:1,name:'Иванов Алексей',role:'Руководитель ЦУ',dept:'ЦУ',hasJob:true,capacity:160},
  {id:2,name:'Петрова Мария',role:'Менеджер проектов',dept:'Разработка',hasJob:true,capacity:160},
  {id:3,name:'Сидоров Дмитрий',role:'Системный аналитик',dept:'Разработка',hasJob:false,capacity:160},
  {id:4,name:'Козлова Анна',role:'DevOps инженер',dept:'Обслуживание',hasJob:true,capacity:160},
  {id:5,name:'Новиков Игорь',role:'HR-специалист',dept:'ЦУ',hasJob:false,capacity:120},
];
const INIT_PROJECTS=[
  {id:1,name:'Миграция на облако',status:'В работе',dept:'Разработка',lead:'Петрова Мария',deadline:'2026-09-30',start:'2026-04-01',hours:240},
  {id:2,name:'Внедрение ITSM',status:'В работе',dept:'Обслуживание',lead:'Козлова Анна',deadline:'2026-07-15',start:'2026-03-01',hours:180},
  {id:3,name:'Обновление ИБ-систем',status:'Планируется',dept:'ЦУ',lead:'Иванов Алексей',deadline:'2026-12-31',start:'2026-08-01',hours:120},
  {id:4,name:'Разработка портала',status:'В работе',dept:'Разработка',lead:'Петрова Мария',deadline:'2026-08-01',start:'2026-05-01',hours:200},
  {id:5,name:'Аудит процессов',status:'Завершён',dept:'ЦУ',lead:'Иванов Алексей',deadline:'2026-05-01',start:'2026-02-01',hours:80},
];
const INIT_DEPTS=[
  {id:1,name:'Центральное управление',head:'Иванов Алексей',staff:2,projects:2},
  {id:2,name:'Разработка',head:'Петрова Мария',staff:2,projects:2},
  {id:3,name:'Обслуживание',head:'Козлова Анна',staff:1,projects:1},
];

// ── helpers ─────────────────────────────────────────────────────
const e = h; // alias

function Badge({status}) {
  const map = {'Действует':'b-green','В работе':'b-blue','Завершён':'b-green','Планируется':'b-gray','Архив':'b-gray','Разработка':'b-amber'};
  return h('span',{class:`badge ${map[status]||'b-gray'}`},status);
}

function Empty({icon,text}){
  return h('div',{class:'empty'},[h('div',{class:'empty-icon'},icon),h('div',null,text)]);
}

function Toast({msg,type}){
  if(!msg) return null;
  return h('div',{class:'toast',style:{background:type==='info'?'#374151':'#1a6fd4'}},msg);
}

// ── Tags render ─────────────────────────────────────────────────
function Tags({tags}){
  return h('div',{class:'tags'},tags.map(t=>{
    const s=tagStyle(t);
    return h('span',{class:'tag',style:{background:s.bg,color:s.color},key:t},t);
  }));
}

// ── App ─────────────────────────────────────────────────────────
function App(){
  const [section,setSection]=useState('docs');
  const [docs,setDocs]=useState(INIT_DOCS);
  const [regs,setRegs]=useState(INIT_REGS);
  const [projects,setProjects]=useState(INIT_PROJECTS);
  const [depts,setDepts]=useState(INIT_DEPTS);
  const [people,setPeople]=useState(INIT_PEOPLE);
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [ganttMode,setGanttMode]=useState('gantt');
  const [apiKey,setApiKey]=useState('');
  const [aiResult,setAiResult]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [checkText,setCheckText]=useState('');
  const toastTm=useRef(null);

  useEffect(()=>{setSearch('');},[section]);

  function showToast(msg,type='success'){
    setToast({msg,type});
    clearTimeout(toastTm.current);
    toastTm.current=setTimeout(()=>setToast(null),2800);
  }

  const cur=SECTIONS.find(s=>s.id===section);

  // workload
  const loads=useMemo(()=>people.map(person=>{
    const assigned=projects.filter(p=>p.lead===person.name);
    const totalHours=assigned.reduce((s,p)=>s+(p.hours||0),0);
    const capacity=person.capacity||160;
    const pct=Math.min(Math.round((totalHours/capacity)*100),150);
    return {...person,totalHours,capacity,pct,assigned};
  }),[people,projects]);

  const avgLoad=loads.length?Math.round(loads.reduce((s,l)=>s+l.pct,0)/loads.length):0;
  const overloaded=loads.filter(l=>l.pct>=110).length;
  const today=new Date(); today.setHours(0,0,0,0);
  const soonDeadline=projects.filter(p=>{
    if(p.status==='Завершён') return false;
    const d=new Date(p.deadline);
    const diff=(d-today)/86400000;
    return diff>=0&&diff<=30;
  }).length;

  // add handlers
  function addLink(data){
    const url=data.url.startsWith('http')?data.url:'https://'+data.url;
    const tags=(data.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
    if(!tags.includes('Ссылка')) tags.push('Ссылка');
    setDocs(d=>[{id:Date.now(),name:data.name||url,size:'—',date:new Date().toLocaleDateString('ru'),tags,type:'link',url},...d]);
    showToast('Ссылка добавлена');
  }
  function handleFiles(files){
    const nd=Array.from(files).map((f,i)=>({
      id:Date.now()+i,name:f.name,
      size:f.size>=1048576?(f.size/1048576).toFixed(1)+' МБ':Math.round(f.size/1024)+' КБ',
      date:new Date().toLocaleDateString('ru'),tags:['Загружено'],
    }));
    setDocs(d=>[...nd,...d]);
    showToast(`Загружено: ${nd.length} файл(ов)`);
  }

  // ai check
  async function runCheck(){
    if(!checkText.trim()) return;
    setAiLoading(true); setAiResult(null);
    const ctx=`ПРОЕКТЫ:\n${projects.map(p=>`${p.name} (${p.dept}, рук: ${p.lead}, ${p.status})`).join('\n')}\n\nДЕПАРТАМЕНТЫ:\n${depts.map(d=>`${d.name} (рук: ${d.head}, ${d.staff} чел.)`).join('\n')}\n\nСОТРУДНИКИ:\n${people.map(p=>`${p.name} — ${p.role} (${p.dept}), ДИ: ${p.hasJob?'есть':'нет'}`).join('\n')}\n\nРЕГЛАМЕНТЫ:\n${regs.map(r=>`${r.name} (${r.status})`).join('\n')}\n\nДОКУМЕНТЫ:\n${docs.map(d=>d.name).join('\n')}`;
    const sys=`Ты — ИИ-аналитик. Проанализируй задачу на соответствие базе знаний организации.\n\n${ctx}\n\nОтветь строго JSON без markdown:\n{"verdict":"соответствует"|"не соответствует"|"частично соответствует","score":0-100,"summary":"текст","responsible":"ФИО или пусто","issues":["..."],"recommendations":["..."]}`;
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:[{role:'user',content:checkText}]}),
      });
      const data=await resp.json();
      let raw=data.content?.[0]?.text||'';
      raw=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
      setAiResult(JSON.parse(raw));
    }catch(err){
      setAiResult({verdict:'ошибка',score:0,summary:'Не удалось выполнить проверку. Проверьте API-ключ.',responsible:'',issues:[String(err)],recommendations:['Убедитесь, что API-ключ Anthropic введён корректно']});
    }
    setAiLoading(false);
  }

  // filtered
  const q=search.toLowerCase();
  const fDocs=docs.filter(d=>d.name.toLowerCase().includes(q)||d.tags.some(t=>t.toLowerCase().includes(q)));
  const fRegs=regs.filter(r=>r.name.toLowerCase().includes(q)||r.status.toLowerCase().includes(q)||r.tags.some(t=>t.toLowerCase().includes(q)));
  const fProj=projects.filter(p=>p.name.toLowerCase().includes(q)||p.dept.toLowerCase().includes(q)||p.lead.toLowerCase().includes(q)||p.status.toLowerCase().includes(q));
  const fDepts=depts.filter(d=>d.name.toLowerCase().includes(q)||d.head.toLowerCase().includes(q));
  const fPeople=people.filter(p=>p.name.toLowerCase().includes(q)||p.role.toLowerCase().includes(q)||p.dept.toLowerCase().includes(q));

  const counts={docs:docs.length,regs:regs.length,proj:projects.length,dept:depts.length,people:people.length};
  const hideExtra=['load','check'].includes(section);

  function subtitle(){
    if(section==='load') return ganttMode==='gantt'?'Диаграмма Ганта':'Загрузка сотрудников';
    if(section==='check') return 'AI-анализ соответствия';
    return `${counts[section]||0} записей`;
  }

  function renderSection(){
    if(section==='docs')   return h(DocsSection,{docs:fDocs,onDel:id=>{setDocs(d=>d.filter(x=>x.id!==id));showToast('Удалено','info');}});
    if(section==='regs')   return h(RegsSection,{regs:fRegs,onDel:id=>{setRegs(r=>r.filter(x=>x.id!==id));showToast('Удалено','info');}});
    if(section==='proj')   return h(ProjSection,{projects:fProj,onDel:id=>{setProjects(p=>p.filter(x=>x.id!==id));showToast('Удалено','info');}});
    if(section==='dept')   return h(DeptSection,{depts:fDepts,onDel:id=>{setDepts(d=>d.filter(x=>x.id!==id));showToast('Удалено','info');}});
    if(section==='people') return h(PeopleSection,{people:fPeople,onDel:id=>{setPeople(p=>p.filter(x=>x.id!==id));showToast('Удалено','info');}});
    if(section==='load')   return h(LoadSection,{loads,projects,ganttMode,avgLoad,overloaded,soonDeadline,today});
    if(section==='check')  return h(CheckSection,{checkText,setCheckText,apiKey,setApiKey,onRun:runCheck,aiLoading,aiResult});

function GanttView({projects,today}){
  const active=projects.filter(p=>p.start&&p.deadline);
  if(!active.length) return h(Empty,{icon:'📊',text:'Нет проектов с датами'});
  const dates=active.flatMap(p=>[new Date(p.start),new Date(p.deadline)]);
  const minDate=Math.min(...dates.map(d=>d.getTime()));
  const maxDate=Math.max(...dates.map(d=>d.getTime()));
  const span=maxDate-minDate||86400000;
  const viewMin=minDate-span*0.02, viewMax=maxDate+span*0.05;
  const totalMs=viewMax-viewMin;
  const PL=90,BW=242,ROW=32,HDR=36;
  const H=active.length*ROW+HDR;
  const toX=d=>PL+((new Date(d).getTime()-viewMin)/totalMs)*BW;
  const todayX=PL+((today.getTime()-viewMin)/totalMs)*BW;

  const months=[];
  const md=new Date(viewMin); md.setDate(1);
  while(md.getTime()<=viewMax){
    const x=toX(md);
    if(x>PL&&x<PL+BW) months.push({x,label:md.toLocaleDateString('ru',{month:'short'})});
    md.setMonth(md.getMonth()+1);
  }

  const sorted=[...active].sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const diffDays=d=>Math.round((new Date(d)-today)/86400000);

  return h('div',null,
    h('div',{class:'gantt-wrap'},
      h('svg',{viewBox:`0 0 340 ${H}`,width:340,height:H,xmlns:'http://www.w3.org/2000/svg'},
        months.map((m,i)=>h('g',{key:i},
          h('line',{x1:m.x,y1:HDR,x2:m.x,y2:H,stroke:'#e5e7eb','stroke-width':1}),
          h('text',{x:m.x+3,y:HDR-6,'font-size':10,fill:'#9ca3af'},m.label),
        )),
        todayX>PL&&todayX<PL+BW&&h('g',null,
          h('line',{x1:todayX,y1:HDR-12,x2:todayX,y2:H,stroke:'#dc2626','stroke-width':1.5,'stroke-dasharray':'4 3'}),
          h('text',{x:todayX+2,y:HDR-2,'font-size':9,fill:'#dc2626','font-weight':700},'сег.'),
        ),
        active.map((p,i)=>{
          const y=HDR+i*ROW;
          const isLate=new Date(p.deadline)<today&&p.status!=='Завершён';
          const x1=toX(p.start),x2=toX(p.deadline);
          const bw=Math.max(x2-x1,4);
          const color=isLate?'#fca5a5':PROJ_COLORS[i%PROJ_COLORS.length];
          const tc=isLate?'#991b1b':'#fff';
          const lbl=p.lead.length>12?p.lead.slice(0,11)+'…':p.lead;
          return h('g',{key:p.id},
            h('rect',{x:0,y,width:340,height:ROW,fill:i%2===0?'#fafafa':'#fff'}),
            h('text',{x:PL-4,y:y+ROW/2+4,'font-size':10,fill:'#374151','text-anchor':'end'},lbl),
            h('rect',{x:x1,y:y+6,width:bw,height:ROW-12,rx:4,fill:color,opacity:.9}),
            bw>30&&h('text',{x:x1+bw/2,y:y+ROW/2+4,'font-size':9,fill:tc,'text-anchor':'middle'},p.name.slice(0,14)),
          );
        }),
      )
    ),
    h('div',{class:'dl-section'},
      h('h3',null,'Ближайшие дедлайны'),
      sorted.map(p=>{
        const diff=diffDays(p.deadline);
        const dc=diff<0?'#dc2626':diff<=14?'#d97706':'#16a34a';
        return h('div',{key:p.id,class:'dl-item'},
          h('div',{class:'dot',style:{background:dc}}),
          h('div',{style:{flex:1,fontSize:13,color:'#111827'}},p.name),
          h('div',{style:{fontSize:11,color:'#6b7280'}},diff<0?`просрочен ${Math.abs(diff)}д`:diff===0?'сегодня':`${diff}д`),
        );
      })
    )
  );
}

      h('h2',null,'Новый департамент'),
      h('div',{class:'field'},h('label',null,'Название *'),h('input',{value:f.name,onInput:e=>setF({...f,name:e.target.value})})),
      h('div',{class:'field'},h('label',null,'Руководитель'),h('input',{value:f.head,onInput:e=>setF({...f,head:e.target.value})})),
      h('div',{class:'field'},h('label',null,'Кол-во сотрудников'),h('input',{type:'number',value:f.staff,onInput:e=>setF({...f,staff:e.target.value})})),
      h('div',{class:'field'},h('label',null,'Кол-во проектов'),h('input',{type:'number',value:f.projects,onInput:e=>setF({...f,projects:e.target.value})})),
      h('button',{class:'btn-save',style:{background:'#b45309'},onClick:()=>{if(f.name)onSave(f);}},'Сохранить'),
    )
  );
}

function PersonModal({depts,onClose,onSave}){
  const [f,setF]=useState({name:'',role:'',dept:'',capacity:160,hasJob:false});
  return h('div',{class:'overlay',onClick:onClose},
    h('div',{class:'modal',onClick:e=>e.stopPropagation()},
      h('div',{class:'modal-handle'}),
      h('h2',null,'Новый сотрудник'),
      h('div',{class:'field'},h('label',null,'ФИО *'),h('input',{placeholder:'Иванов Иван',value:f.name,onInput:e=>setF({...f,name:e.target.value})})),
      h('div',{class:'field'},h('label',null,'Должность'),h('input',{value:f.role,onInput:e=>setF({...f,role:e.target.value})})),
      h('div',{class:'field'},h('label',null,'Департамент'),h('select',{value:f.dept,onChange:e=>setF({...f,dept:e.target.value})},
        h('option',{value:''},'— выбрать —'),
        depts.map(d=>h('option',{key:d.id},d.name)),
      )),
      h('div',{class:'field'},h('label',null,'Норма часов/мес'),h('input',{type:'number',value:f.capacity,onInput:e=>setF({...f,capacity:Number(e.target.value)||160})})),
      h('div',{class:'field'},h('label',{class:'field-check'},
        h('input',{type:'checkbox',checked:f.hasJob,onChange:e=>setF({...f,hasJob:e.target.checked})}),
        'Должностная инструкция загружена',
      )),
      h('button',{class:'btn-save',style:{background:'#be185d'},onClick:()=>{if(f.name)onSave(f);}},'Сохранить'),
    )
  );
}

render(h(App,null), document.getElementById('root'));
</script>
</body>
